name: Build and Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image backend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-api:latest ./backend

      - name: Build image frontend
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest ./frontend

      - name: Push image backend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/flask-api:latest

      - name: Push image frontend
        run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend-app:latest